<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Nav Extractor</title>
  <style>
    body { width: 380px; padding: 16px; font-family: sans-serif; font-size: 13px; }
    h2 { margin: 0 0 12px; font-size: 15px; }
    button {
      width: 100%; padding: 8px; margin-bottom: 8px;
      background: #0064e0; color: white; border: none;
      border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    button:hover { background: #0050b3; }
    button:disabled { background: #999; cursor: default; }
    #status { padding: 8px; background: #f0f0f0; border-radius: 4px; min-height: 20px; }
    #output {
      margin-top: 10px; width: 100%; height: 200px;
      font-size: 11px; font-family: monospace;
      border: 1px solid #ccc; border-radius: 4px;
      padding: 4px; box-sizing: border-box; resize: vertical;
    }
    .format-btns { display: flex; gap: 6px; margin-bottom: 8px; }
    .format-btns button { flex: 1; background: #555; font-size: 11px; padding: 5px; }
    .format-btns button:hover { background: #333; }
    #copy-btn { background: #28a745; }
    #copy-btn:hover { background: #1e7e34; }
  </style>
</head>
<body>
  <h2>🔗 Meta Horizon Nav Extractor</h2>
  <button id="extract-btn">全階層を展開してリンクを取得</button>
  <div id="status">ボタンを押してください</div>
  <div class="format-btns" style="display:none" id="format-btns">
    <button data-format="json">JSON</button>
    <button data-format="markdown">Markdown</button>
    <button data-format="csv">CSV</button>
  </div>
  <textarea id="output" style="display:none" readonly></textarea>
  <button id="copy-btn" style="display:none">📋 クリップボードにコピー</button>
  <script src="popup.js"></script>
</body>
</html>
